name: Process Orange Invoices

on:
  workflow_dispatch:
    inputs:
      mois:
        description: "Mois à traiter (ex: AVRIL)"
        required: true
        type: string
      pdfs:
        description: "PDFs encodés en base64 (JSON array)"
        required: true
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode and save PDFs
        run: |
          python - <<'EOF'
          import json, base64, os

          pdfs = json.loads(os.environ["PDFS_INPUT"])
          os.makedirs("pdfs_input", exist_ok=True)

          for pdf in pdfs:
              path = os.path.join("pdfs_input", pdf["name"])
              with open(path, "wb") as f:
                  f.write(base64.b64decode(pdf["data"]))
              print(f"Sauvegardé : {pdf['name']}")
          EOF
        env:
          PDFS_INPUT: ${{ inputs.pdfs }}

      - name: Run main script
        run: python main.py --dossier pdfs_input --mois ${{ inputs.mois }}
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_TOKEN:      ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID:    ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID:   ${{ secrets.AIRTABLE_TABLE_ID }}
          GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID:     ${{ secrets.GOOGLE_SHEET_ID }}
